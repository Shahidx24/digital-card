<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 380px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; overflow: hidden; padding-bottom: 30px; }
        .header { background: #333; height: 100px; position: relative; }
        .avatar { width: 90px; height: 90px; background: #007bff; border-radius: 50%; border: 4px solid white; position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); display: flex; justify-content: center; align-items: center; color: white; font-size: 36px; font-weight: bold; }
        .info { margin-top: 55px; padding: 0 20px; }
        h1 { margin: 10px 0 5px 0; color: #333; font-size: 24px; }
        .title { color: #777; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .btn { display: flex; align-items: center; justify-content: center; background: #f1f3f5; color: #333; text-decoration: none; padding: 12px; margin: 10px 0; border-radius: 8px; font-weight: 600; transition: 0.2s; }
        .btn:hover { background: #007bff; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="avatar" id="avatarInitials">U</div>
    </div>
    <div class="info">
        <h1 id="profName">User Name</h1>
        <div class="title" id="profRole">Profession</div>
        
        <a id="linkCall" href="#" class="btn btn-primary">📞 Call Mobile</a>
        <a id="linkEmail" href="#" class="btn">✉️ Email Me</a>
        <a id="linkWeb" href="#" class="btn" style="display:none;">🌐 Visit Website</a>
    </div>
</div>

<script>
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return decodeURIComponent(urlParams.get(param) || '');
    }

    const name = getQueryParam('name') || 'Valued Client';
    const role = getQueryParam('role') || 'Professional';
    const phone = getQueryParam('phone');
    const email = getQueryParam('email');
    const web = getQueryParam('web');

    document.getElementById('profName').innerText = name;
    document.getElementById('profRole').innerText = role;
    document.getElementById('avatarInitials').innerText = name.charAt(0).toUpperCase();

    if(phone) document.getElementById('linkCall').href = `tel:${phone}`;
    if(email) document.getElementById('linkEmail').href = `mailto:${email}`;
    
    if(web && web !== "undefined" && web !== "") {
        const webBtn = document.getElementById('linkWeb');
        webBtn.href = web;
        webBtn.style.display = 'flex';
    }
</script>

</body>
</html>

    <title>Create Your Digital Biz Card</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #007bff; color: white; border: none; padding: 12px; margin-top: 20px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #qr-result { text-align: center; margin-top: 25px; display: none; padding: 20px; border-top: 2px dashed #eee; }
        #qrcode { display: inline-block; margin-top: 15px; }
    </style>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <h2>BizCard Generator</h2>
    <form id="bizForm">
        <label>Full Name</label>
        <input type="text" id="name" required placeholder="John Doe">

        <label>Job Title / Role</label>
        <input type="text" id="role" required placeholder="Freelance Designer">

        <label>Phone Number</label>
        <input type="tel" id="phone" required placeholder="+1234567890">

        <label>Email Address</label>
        <input type="email" id="email" required placeholder="john@example.com">

        <label>Website / Portfolio URL</label>
        <input type="url" id="website" placeholder="https://myportfolio.com">

        <button type="submit">Generate My QR Card</button>
    </form>

    <div id="qr-result">
        <h3>Your Digital Card is Ready!</h3>
        <p>Scan this QR code to view your profile:</p>
        <div id="qrcode"></div>
        <p><small>Save this QR image or copy your link to print on physical cards.</small></p>
    </div>
</div>

<script>
    document.getElementById('bizForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const name = encodeURIComponent(document.getElementById('name').value);
        const role = encodeURIComponent(document.getElementById('role').value);
        const phone = encodeURIComponent(document.getElementById('phone').value);
        const email = encodeURIComponent(document.getElementById('email').value);
        const website = encodeURIComponent(document.getElementById('website').value);

        let baseUrl = window.location.href;
        if (baseUrl.includes('index.html')) {
            baseUrl = baseUrl.replace('index.html', 'profile.html');
        } else if (baseUrl.endsWith('/')) {
            baseUrl = baseUrl + 'profile.html';
        } else {
            baseUrl = baseUrl + '/profile.html';
        }
        
        const finalProfileUrl = `${baseUrl}?name=${name}&role=${role}&phone=${phone}&email=${email}&web=${website}`;

        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; 
        
        try {
            new QRCode(qrContainer, {
                text: finalProfileUrl,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            
            document.getElementById('qr-result').style.display = 'block';
            document.getElementById('qr-result').scrollIntoView({ behavior: 'smooth' });
        } catch (error) {
            alert("QR Generation failed. Connect to the internet so the library can load.");
        }
    });
</script>

</body>
</html>
